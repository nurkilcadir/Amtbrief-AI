<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>AmtBrief AI</title>
  <style>
    html, body { margin: 0; height: 100%; background: #f5f7fb; font-family: -apple-system, system-ui, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; color: #1e3a8a; }
    .logo { width: 72px; height: 72px; border-radius: 18px; background: #dbe6fb; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 38px; height: 38px; }
    .name { font-size: 18px; font-weight: 700; color: #0f172a; }
    .spin { width: 26px; height: 26px; border: 3px solid #c7d7f5; border-top-color: #2563eb; border-radius: 50%; animation: s 0.9s linear infinite; }
    @keyframes s { to { transform: rotate(360deg); } }
    .hint { font-size: 12px; color: #64748b; max-width: 240px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21h18M4 10h16M5 10V7l7-4 7 4v3M6 21V10M18 21V10M10 21v-6h4v6" />
      </svg>
    </div>
    <div class="name">AmtBrief AI</div>
    <div class="spin"></div>
    <div class="hint">Connecting…<br />Start the dev server: <b>npm run dev</b></div>
  </div>
</body>
</html>
